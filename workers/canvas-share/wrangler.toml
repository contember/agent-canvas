name = "canvas-share"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# R2 bucket for storing canvas snapshots (compiled JS, JSX source, uploads)
[[r2_buckets]]
binding = "BLOBS"
bucket_name = "canvas-share-blobs"

# KV namespace for feedback entries (small, per-share lists)
[[kv_namespaces]]
binding = "FEEDBACK"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

# Static assets — runtime bundles served to shared canvases.
# Copy daemon/dist/{runtime,components,preact-compat,jsx-runtime,client}.js
# and client.css into ./public before deploying.
[assets]
directory = "./public"
binding = "ASSETS"
